<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Pixel Mock Studio — Animated Google Pixel 10 Mockups</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
/* ============================================================
   Pixel Mock Studio
   Animated Google Pixel 10 mockups from your photos & videos
   ============================================================ */

:root {
  --bg-0: #07070b;
  --bg-1: #0d0d18;
  --bg-2: #15152a;
  --panel: rgba(255, 255, 255, 0.04);
  --panel-border: rgba(255, 255, 255, 0.08);
  --text: #f4f4f7;
  --text-dim: #a6a6b8;
  --text-faint: #6b6b80;
  --accent: #8b5cf6;
  --accent-2: #ec4899;
  --accent-3: #06b6d4;
  --success: #10b981;
  --radius: 14px;
  --radius-sm: 8px;
  --shadow-soft: 0 10px 40px rgba(0, 0, 0, 0.4);
  --shadow-strong: 0 30px 80px rgba(0, 0, 0, 0.6);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  background: var(--bg-0);
  color: var(--text);
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
  overflow-x: hidden;
}

/* Animated ambient background */
body::before {
  content: '';
  position: fixed;
  inset: -20%;
  background:
    radial-gradient(ellipse 600px 400px at 20% 20%, rgba(139, 92, 246, 0.18), transparent 60%),
    radial-gradient(ellipse 500px 600px at 80% 60%, rgba(236, 72, 153, 0.14), transparent 60%),
    radial-gradient(ellipse 700px 400px at 50% 90%, rgba(6, 182, 212, 0.12), transparent 60%);
  filter: blur(40px);
  z-index: -2;
  animation: ambientShift 18s ease-in-out infinite alternate;
}
body::after {
  content: '';
  position: fixed;
  inset: 0;
  background-image:
    radial-gradient(circle at 1px 1px, rgba(255, 255, 255, 0.025) 1px, transparent 0);
  background-size: 32px 32px;
  z-index: -1;
  pointer-events: none;
}
@keyframes ambientShift {
  0%   { transform: translate(0, 0) scale(1); }
  100% { transform: translate(40px, -30px) scale(1.05); }
}

/* ============================== HEADER ============================== */
.app-header {
  padding: 40px 24px 16px;
  text-align: center;
  max-width: 1400px;
  margin: 0 auto;
}
.app-badge {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 6px 14px;
  background: var(--panel);
  border: 1px solid var(--panel-border);
  border-radius: 100px;
  font-size: 12px;
  color: var(--text-dim);
  letter-spacing: 0.5px;
  margin-bottom: 18px;
}
.app-badge .dot {
  width: 6px; height: 6px;
  background: var(--success);
  border-radius: 50%;
  box-shadow: 0 0 10px var(--success);
}
.app-title {
  font-size: clamp(32px, 5vw, 52px);
  font-weight: 800;
  letter-spacing: -1.5px;
  background: linear-gradient(135deg, #fff 0%, #c4b5fd 50%, #f9a8d4 100%);
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
  margin-bottom: 10px;
}
.app-subtitle {
  color: var(--text-dim);
  font-size: 16px;
  max-width: 640px;
  margin: 0 auto;
  line-height: 1.5;
}

/* ============================== UPLOAD ZONE ============================== */
.upload-wrap {
  max-width: 900px;
  margin: 32px auto;
  padding: 0 24px;
}
.upload-zone {
  position: relative;
  border: 2px dashed rgba(255, 255, 255, 0.15);
  border-radius: 24px;
  padding: 56px 32px;
  text-align: center;
  cursor: pointer;
  transition: all 0.3s ease;
  background: linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0.04));
  backdrop-filter: blur(10px);
}
.upload-zone:hover {
  border-color: var(--accent);
  background: linear-gradient(180deg, rgba(139, 92, 246, 0.05), rgba(236, 72, 153, 0.05));
  transform: translateY(-2px);
}
.upload-zone.dragging {
  border-color: var(--accent-2);
  background: linear-gradient(180deg, rgba(139, 92, 246, 0.12), rgba(236, 72, 153, 0.12));
  transform: scale(1.01);
}
.upload-icon {
  width: 72px; height: 72px;
  margin: 0 auto 20px;
  display: flex; align-items: center; justify-content: center;
  background: linear-gradient(135deg, var(--accent), var(--accent-2));
  border-radius: 22px;
  box-shadow: 0 10px 30px rgba(139, 92, 246, 0.4);
  font-size: 32px;
}
.upload-title {
  font-size: 20px;
  font-weight: 700;
  margin-bottom: 8px;
}
.upload-hint {
  color: var(--text-dim);
  font-size: 14px;
  margin-bottom: 18px;
}
.upload-formats {
  display: inline-flex;
  gap: 6px;
  flex-wrap: wrap;
  justify-content: center;
}
.format-chip {
  font-size: 11px;
  padding: 4px 10px;
  background: rgba(255, 255, 255, 0.06);
  border-radius: 100px;
  color: var(--text-faint);
  letter-spacing: 0.5px;
}
#fileInput { display: none; }

/* ============================== CONTROLS ============================== */
.controls {
  max-width: 1400px;
  margin: 0 auto 28px;
  padding: 0 24px;
  display: none;
  gap: 16px;
  flex-wrap: wrap;
  align-items: center;
}
.controls.visible { display: flex; }
.control-group {
  display: flex;
  flex-direction: column;
  gap: 6px;
  flex: 1;
  min-width: 180px;
}
.control-label {
  font-size: 11px;
  color: var(--text-faint);
  text-transform: uppercase;
  letter-spacing: 1px;
  font-weight: 600;
}
.control-select, .control-color {
  background: var(--panel);
  border: 1px solid var(--panel-border);
  color: var(--text);
  padding: 10px 14px;
  border-radius: var(--radius-sm);
  font-size: 14px;
  font-family: inherit;
  cursor: pointer;
  outline: none;
  transition: border-color 0.2s;
}
.control-select:hover, .control-color:hover { border-color: var(--accent); }
.control-select:focus { border-color: var(--accent); }
.control-color {
  -webkit-appearance: none;
  appearance: none;
  width: 50px;
  height: 40px;
  padding: 4px;
  cursor: pointer;
}

.btn {
  background: linear-gradient(135deg, var(--accent), var(--accent-2));
  color: white;
  border: none;
  padding: 11px 22px;
  border-radius: var(--radius-sm);
  font-size: 14px;
  font-weight: 600;
  font-family: inherit;
  cursor: pointer;
  transition: transform 0.15s, box-shadow 0.2s;
  display: inline-flex;
  align-items: center;
  gap: 8px;
  white-space: nowrap;
}
.btn:hover { transform: translateY(-1px); box-shadow: 0 8px 24px rgba(139, 92, 246, 0.4); }
.btn:active { transform: translateY(0); }
.btn.secondary {
  background: var(--panel);
  border: 1px solid var(--panel-border);
  color: var(--text);
}
.btn.secondary:hover { background: rgba(255, 255, 255, 0.08); }
.btn.danger {
  background: rgba(239, 68, 68, 0.15);
  border: 1px solid rgba(239, 68, 68, 0.3);
  color: #fca5a5;
}
.btn.danger:hover { background: rgba(239, 68, 68, 0.25); }

/* ============================== GALLERY ============================== */
.gallery {
  max-width: 1400px;
  margin: 0 auto;
  padding: 0 24px 80px;
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 40px;
  perspective: 1500px;
}
.gallery:empty::after {
  content: 'Your mockups will appear here';
  grid-column: 1 / -1;
  text-align: center;
  color: var(--text-faint);
  padding: 80px 0;
  font-size: 15px;
}

.mockup-cell {
  position: relative;
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 560px;
  transform-style: preserve-3d;
}

.mockup-stage {
  position: relative;
  transform-style: preserve-3d;
  width: 260px;
  height: 560px;
}

/* ---- Animation presets ---- */
.anim-rotate .mockup-stage {
  animation: rotateY 8s linear infinite;
}
.anim-float .mockup-stage {
  animation: floatBob 4s ease-in-out infinite;
}
.anim-tilt .mockup-stage {
  transition: transform 0.2s ease-out;
}
.anim-showcase .mockup-stage {
  animation: showcaseIn 1.2s cubic-bezier(0.2, 0.8, 0.2, 1) both, gentleSway 6s ease-in-out infinite 1.2s;
}
.anim-static .mockup-stage {
  transform: rotateY(-8deg) rotateX(4deg);
}

@keyframes rotateY {
  from { transform: rotateY(0deg); }
  to   { transform: rotateY(360deg); }
}
@keyframes floatBob {
  0%, 100% { transform: translateY(0) rotateZ(-1deg); }
  50%      { transform: translateY(-18px) rotateZ(1deg); }
}
@keyframes showcaseIn {
  0%   { transform: rotateY(-90deg) scale(0.6); opacity: 0; }
  100% { transform: rotateY(0deg) scale(1); opacity: 1; }
}
@keyframes gentleSway {
  0%, 100% { transform: rotateY(-8deg) rotateX(3deg); }
  50%      { transform: rotateY(8deg) rotateX(-2deg); }
}

/* ---- Pixel 10 Phone Body ---- */
.phone {
  position: absolute;
  inset: 0;
  transform-style: preserve-3d;
}

.phone-face {
  position: absolute;
  inset: 0;
  border-radius: 38px;
  background: linear-gradient(145deg, #2a2a2e, #0f0f12);
  padding: 6px;
  box-shadow:
    inset 0 0 0 1px rgba(255, 255, 255, 0.08),
    0 0 0 1px rgba(0, 0, 0, 0.6),
    0 30px 60px rgba(0, 0, 0, 0.5);
  backface-visibility: hidden;
}
.phone-face.frame-obsidian { background: linear-gradient(145deg, #2a2a2e, #0f0f12); }
.phone-face.frame-porcelain { background: linear-gradient(145deg, #f5f5f0, #d4d4cc); }
.phone-face.frame-rose { background: linear-gradient(145deg, #e8a5b8, #b86d80); }
.phone-face.frame-hazel { background: linear-gradient(145deg, #c9b896, #8a7858); }

.phone-screen {
  position: relative;
  width: 100%;
  height: 100%;
  border-radius: 32px;
  overflow: hidden;
  background: #000;
  box-shadow: inset 0 0 0 1px rgba(0, 0, 0, 0.8);
}
.phone-screen img,
.phone-screen video {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
}

/* Punch-hole front camera */
.punch-hole {
  position: absolute;
  top: 14px;
  left: 50%;
  transform: translateX(-50%);
  width: 10px;
  height: 10px;
  background: #000;
  border-radius: 50%;
  box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.15);
  z-index: 5;
}

/* Side buttons */
.phone-buttons {
  position: absolute;
  top: 0;
  bottom: 0;
  right: -3px;
  width: 4px;
  transform-style: preserve-3d;
}
.btn-power {
  position: absolute;
  right: 0;
  top: 28%;
  width: 4px;
  height: 70px;
  background: linear-gradient(90deg, #1a1a1d, #3a3a3e);
  border-radius: 0 2px 2px 0;
  transform: translateZ(0);
}
.btn-volume {
  position: absolute;
  right: 0;
  top: 42%;
  width: 4px;
  height: 50px;
  background: linear-gradient(90deg, #1a1a1d, #3a3a3e);
  border-radius: 0 2px 2px 0;
}

/* ---- Back of the phone (visible during 3D rotation) ---- */
.phone-back {
  position: absolute;
  inset: 0;
  border-radius: 38px;
  background: linear-gradient(145deg, #1a1a1d, #050507);
  transform: rotateY(180deg);
  backface-visibility: hidden;
  box-shadow:
    inset 0 0 0 1px rgba(255, 255, 255, 0.06),
    0 0 0 1px rgba(0, 0, 0, 0.6),
    0 30px 60px rgba(0, 0, 0, 0.5);
  overflow: hidden;
}
.phone-back.frame-obsidian { background: linear-gradient(145deg, #1a1a1d, #050507); }
.phone-back.frame-porcelain { background: linear-gradient(145deg, #ededea, #c8c8c0); }
.phone-back.frame-rose { background: linear-gradient(145deg, #d99cb0, #a85a70); }
.phone-back.frame-hazel { background: linear-gradient(145deg, #b8a785, #786a4f); }

/* Camera bar (Pixel 10 signature) */
.camera-bar {
  position: absolute;
  top: 28px;
  left: 50%;
  transform: translateX(-50%);
  width: 80%;
  height: 56px;
  background: linear-gradient(180deg, #0a0a0c, #1a1a1d);
  border-radius: 28px;
  display: flex;
  align-items: center;
  justify-content: space-around;
  padding: 0 24px;
  box-shadow:
    inset 0 0 0 1px rgba(255, 255, 255, 0.08),
    inset 0 2px 6px rgba(0, 0, 0, 0.6);
}
.camera-lens {
  width: 28px;
  height: 28px;
  border-radius: 50%;
  background: radial-gradient(circle at 30% 30%, #444 0%, #000 60%);
  box-shadow:
    inset 0 0 0 2px #1a1a1d,
    inset 0 0 0 4px #2a2a2e,
    0 2px 4px rgba(0, 0, 0, 0.6);
  position: relative;
}
.camera-lens::after {
  content: '';
  position: absolute;
  top: 6px;
  left: 6px;
  width: 8px;
  height: 8px;
  background: radial-gradient(circle, rgba(80, 130, 200, 0.6), transparent);
  border-radius: 50%;
}
.camera-flash {
  width: 10px;
  height: 10px;
  border-radius: 50%;
  background: radial-gradient(circle, #fff8dc, #d4d4a0);
  box-shadow: 0 0 6px rgba(255, 248, 220, 0.4);
}

.google-logo {
  position: absolute;
  bottom: 80px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 24px;
  font-weight: 500;
  color: rgba(255, 255, 255, 0.5);
  letter-spacing: -1px;
}
.phone-back.frame-porcelain .google-logo { color: rgba(0, 0, 0, 0.5); }

/* ---- Floor reflection ---- */
.phone-reflection {
  position: absolute;
  bottom: -10px;
  left: 50%;
  transform: translateX(-50%) scaleY(-0.4);
  width: 260px;
  height: 80px;
  background: linear-gradient(180deg, rgba(139, 92, 246, 0.15), transparent);
  filter: blur(20px);
  opacity: 0.6;
  z-index: -1;
}

/* ---- Mockup actions (hover overlay) ---- */
.mockup-actions {
  position: absolute;
  top: 12px;
  right: 12px;
  display: flex;
  flex-direction: column;
  gap: 8px;
  opacity: 0;
  transition: opacity 0.2s;
  z-index: 10;
}
.mockup-cell:hover .mockup-actions { opacity: 1; }
.action-btn {
  width: 36px; height: 36px;
  background: rgba(0, 0, 0, 0.7);
  backdrop-filter: blur(10px);
  border: 1px solid rgba(255, 255, 255, 0.1);
  border-radius: 10px;
  color: white;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 14px;
  transition: all 0.2s;
}
.action-btn:hover { background: var(--accent); border-color: var(--accent); }

/* ============================== EMPTY STATE ============================== */
.empty-state {
  text-align: center;
  padding: 60px 20px;
  color: var(--text-faint);
  grid-column: 1 / -1;
}

/* ============================== TOAST ============================== */
.toast-container {
  position: fixed;
  bottom: 30px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 1000;
  display: flex;
  flex-direction: column;
  gap: 8px;
  align-items: center;
}
.toast {
  background: rgba(20, 20, 35, 0.95);
  backdrop-filter: blur(20px);
  border: 1px solid var(--panel-border);
  padding: 12px 20px;
  border-radius: 100px;
  font-size: 14px;
  color: var(--text);
  box-shadow: var(--shadow-soft);
  animation: toastIn 0.3s ease-out, toastOut 0.3s ease-in 2.7s forwards;
  display: flex;
  align-items: center;
  gap: 8px;
}
.toast.success { border-color: rgba(16, 185, 129, 0.4); }
.toast.error { border-color: rgba(239, 68, 68, 0.4); }
@keyframes toastIn {
  from { opacity: 0; transform: translateY(20px); }
  to   { opacity: 1; transform: translateY(0); }
}
@keyframes toastOut {
  to { opacity: 0; transform: translateY(20px); }
}

/* ============================== FOOTER ============================== */
.app-footer {
  text-align: center;
  padding: 30px 20px;
  color: var(--text-faint);
  font-size: 13px;
  border-top: 1px solid var(--panel-border);
}

/* ============================== RESPONSIVE ============================== */
@media (max-width: 640px) {
  .app-header { padding: 28px 16px 8px; }
  .upload-zone { padding: 40px 20px; }
  .gallery { grid-template-columns: 1fr; gap: 30px; padding: 0 16px 60px; }
  .mockup-cell { min-height: 580px; }
}

/* Carousel scene */
.scene-carousel .gallery {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 20px;
  perspective: 1200px;
}
.scene-carousel .mockup-cell {
  min-height: 560px;
}

/* Spotlight background per cell */
.spotlight-bg::before {
  content: '';
  position: absolute;
  inset: -40px;
  background: radial-gradient(ellipse at center, var(--cell-glow, rgba(139, 92, 246, 0.18)), transparent 60%);
  z-index: -1;
  pointer-events: none;
}
</style>
</head>
<body>

<header class="app-header">
  <div class="app-badge">
    <span class="dot"></span>
    <span>Pixel 10 Mockup Studio</span>
  </div>
  <h1 class="app-title">Pixel Mock Studio</h1>
  <p class="app-subtitle">Drop your photos or screen recordings — get beautifully animated Google Pixel 10 mockups in seconds.</p>
</header>

<section class="upload-wrap">
  <label class="upload-zone" id="uploadZone" for="fileInput">
    <div class="upload-icon">📷</div>
    <div class="upload-title">Drop photos or videos here</div>
    <div class="upload-hint">or click to browse — multiple files supported</div>
    <div class="upload-formats">
      <span class="format-chip">JPG</span>
      <span class="format-chip">PNG</span>
      <span class="format-chip">WEBP</span>
      <span class="format-chip">MP4</span>
      <span class="format-chip">WEBM</span>
      <span class="format-chip">MOV</span>
    </div>
    <input type="file" id="fileInput" accept="image/*,video/*" multiple />
  </label>
</section>

<section class="controls" id="controls">
  <div class="control-group">
    <label class="control-label">Animation</label>
    <select class="control-select" id="animSelect">
      <option value="rotate">3D Rotate</option>
      <option value="float">Float &amp; Sway</option>
      <option value="tilt" selected>Tilt on Hover</option>
      <option value="showcase">Showcase Reveal</option>
      <option value="static">Static Tilt</option>
    </select>
  </div>
  <div class="control-group">
    <label class="control-label">Frame Color</label>
    <select class="control-select" id="frameSelect">
      <option value="obsidian" selected>Obsidian</option>
      <option value="porcelain">Porcelain</option>
      <option value="rose">Rose</option>
      <option value="hazel">Hazel</option>
    </select>
  </div>
  <div class="control-group">
    <label class="control-label">Background Glow</label>
    <select class="control-select" id="glowSelect">
      <option value="purple" selected>Purple Haze</option>
      <option value="sunset">Sunset</option>
      <option value="ocean">Ocean</option>
      <option value="emerald">Emerald</option>
      <option value="mono">Mono</option>
    </select>
  </div>
  <div class="control-group" style="flex: 0;">
    <label class="control-label">&nbsp;</label>
    <button class="btn" id="downloadAllBtn">⬇ Download All</button>
  </div>
  <div class="control-group" style="flex: 0;">
    <label class="control-label">&nbsp;</label>
    <button class="btn danger" id="clearAllBtn">Clear All</button>
  </div>
</section>

<section class="gallery" id="gallery"></section>

<div class="toast-container" id="toastContainer"></div>

<footer class="app-footer">
  Built with care · Pixel 10 mockups rendered in pure CSS · No data leaves your browser
</footer>

<script>
/* ============================================================
   State
   ============================================================ */
const state = {
  files: [],          // [{ id, file, url, type, name }]
  animation: 'tilt',
  frame: 'obsidian',
  glow: 'purple',
};

const GLOW_COLORS = {
  purple:  'rgba(139, 92, 246, 0.22)',
  sunset:  'rgba(251, 146, 60, 0.22)',
  ocean:   'rgba(6, 182, 212, 0.22)',
  emerald: 'rgba(16, 185, 129, 0.22)',
  mono:    'rgba(255, 255, 255, 0.10)',
};

/* ============================================================
   DOM refs
   ============================================================ */
const uploadZone   = document.getElementById('uploadZone');
const fileInput    = document.getElementById('fileInput');
const gallery      = document.getElementById('gallery');
const controls     = document.getElementById('controls');
const animSelect   = document.getElementById('animSelect');
const frameSelect  = document.getElementById('frameSelect');
const glowSelect   = document.getElementById('glowSelect');
const downloadAllBtn = document.getElementById('downloadAllBtn');
const clearAllBtn  = document.getElementById('clearAllBtn');
const toastContainer = document.getElementById('toastContainer');

/* ============================================================
   File handling
   ============================================================ */
fileInput.addEventListener('change', (e) => handleFiles(e.target.files));

['dragenter', 'dragover'].forEach(evt =>
  uploadZone.addEventListener(evt, (e) => {
    e.preventDefault();
    e.stopPropagation();
    uploadZone.classList.add('dragging');
  })
);
['dragleave', 'drop'].forEach(evt =>
  uploadZone.addEventListener(evt, (e) => {
    e.preventDefault();
    e.stopPropagation();
    uploadZone.classList.remove('dragging');
  })
);
uploadZone.addEventListener('drop', (e) => {
  const files = e.dataTransfer.files;
  if (files && files.length) handleFiles(files);
});

function handleFiles(fileList) {
  const accepted = [];
  for (const f of fileList) {
    if (!f.type.startsWith('image/') && !f.type.startsWith('video/')) {
      showToast(`Skipped: ${f.name} (unsupported type)`, 'error');
      continue;
    }
    accepted.push({
      id: 'm_' + Math.random().toString(36).slice(2, 10),
      file: f,
      url: URL.createObjectURL(f),
      type: f.type.startsWith('video/') ? 'video' : 'image',
      name: f.name,
    });
  }
  if (!accepted.length) return;
  state.files.push(...accepted);
  controls.classList.add('visible');
  renderGallery();
  showToast(`Added ${accepted.length} mockup${accepted.length > 1 ? 's' : ''}`, 'success');
}

/* ============================================================
   Render gallery
   ============================================================ */
function renderGallery() {
  gallery.innerHTML = '';
  state.files.forEach((item, idx) => {
    gallery.appendChild(buildMockupCell(item, idx));
  });
}

function buildMockupCell(item, idx) {
  const cell = document.createElement('div');
  cell.className = 'mockup-cell spotlight-bg anim-' + state.animation;
  cell.dataset.id = item.id;
  cell.style.setProperty('--cell-glow', GLOW_COLORS[state.glow]);
  cell.style.animationDelay = (idx * 0.1) + 's';

  const mediaEl = item.type === 'video'
    ? `<video src="${item.url}" autoplay muted loop playsinline></video>`
    : `<img src="${item.url}" alt="${item.name}" />`;

  cell.innerHTML = `
    <div class="mockup-stage">
      <div class="phone">
        <div class="phone-face frame-${state.frame}">
          <div class="phone-screen">
            ${mediaEl}
            <div class="punch-hole"></div>
          </div>
        </div>
        <div class="phone-back frame-${state.frame}">
          <div class="camera-bar">
            <div class="camera-lens"></div>
            <div class="camera-lens"></div>
            <div class="camera-lens"></div>
            <div class="camera-flash"></div>
          </div>
          <div class="google-logo">G</div>
        </div>
        <div class="phone-buttons">
          <div class="btn-power"></div>
          <div class="btn-volume"></div>
        </div>
      </div>
      <div class="phone-reflection"></div>
    </div>
    <div class="mockup-actions">
      <button class="action-btn" title="Download PNG" data-action="download">⬇</button>
      <button class="action-btn" title="Remove" data-action="remove">✕</button>
    </div>
  `;

  // Tilt-on-hover handlers
  if (state.animation === 'tilt') {
    attachTilt(cell.querySelector('.mockup-stage'), cell);
  }

  // Action buttons
  cell.querySelectorAll('.action-btn').forEach(btn => {
    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      const action = btn.dataset.action;
      if (action === 'download') downloadMockup(cell, item.name);
      if (action === 'remove')   removeMockup(item.id);
    });
  });

  return cell;
}

/* ============================================================
   Tilt-on-hover effect (mouse parallax)
   ============================================================ */
function attachTilt(stage, cell) {
  const maxTilt = 18;
  cell.addEventListener('mousemove', (e) => {
    const rect = cell.getBoundingClientRect();
    const x = (e.clientX - rect.left) / rect.width  - 0.5;
    const y = (e.clientY - rect.top)  / rect.height - 0.5;
    stage.style.transform =
      `rotateY(${x * maxTilt}deg) rotateX(${-y * maxTilt}deg) translateZ(20px)`;
  });
  cell.addEventListener('mouseleave', () => {
    stage.style.transform = '';
  });
}

/* ============================================================
   Remove mockup
   ============================================================ */
function removeMockup(id) {
  const item = state.files.find(f => f.id === id);
  if (item) URL.revokeObjectURL(item.url);
  state.files = state.files.filter(f => f.id !== id);
  renderGallery();
  if (!state.files.length) controls.classList.remove('visible');
}

/* ============================================================
   Download single mockup as PNG (via html2canvas)
   ============================================================ */
async function downloadMockup(cell, baseName) {
  const stage = cell.querySelector('.mockup-stage');
  const originalTransform = stage.style.transform;
  // Freeze the phone in a nice static pose for the snapshot
  if (state.animation === 'tilt') {
    stage.style.transform = 'rotateY(-12deg) rotateX(6deg)';
  } else if (state.animation === 'rotate') {
    stage.style.transform = 'rotateY(-15deg)';
  }
  try {
    showToast('Rendering PNG…');
    const canvas = await html2canvas(cell, {
      backgroundColor: null,
      scale: 2,
      useCORS: true,
      logging: false,
    });
    const link = document.createElement('a');
    link.download = baseName.replace(/\.[^.]+$/, '') + '-pixel10-mockup.png';
    link.href = canvas.toDataURL('image/png');
    link.click();
    showToast('Downloaded ✨', 'success');
  } catch (err) {
    console.error(err);
    showToast('Export failed — try a still image', 'error');
  } finally {
    stage.style.transform = originalTransform;
  }
}

/* ============================================================
   Download all
   ============================================================ */
downloadAllBtn.addEventListener('click', async () => {
  if (!state.files.length) return;
  const cells = gallery.querySelectorAll('.mockup-cell');
  downloadAllBtn.disabled = true;
  downloadAllBtn.textContent = '⏳ Exporting…';
  for (let i = 0; i < cells.length; i++) {
    await downloadMockup(cells[i], state.files[i].name);
    await new Promise(r => setTimeout(r, 500));
  }
  downloadAllBtn.disabled = false;
  downloadAllBtn.innerHTML = '⬇ Download All';
});

/* ============================================================
   Clear all
   ============================================================ */
clearAllBtn.addEventListener('click', () => {
  if (!state.files.length) return;
  if (!confirm('Remove all mockups?')) return;
  state.files.forEach(f => URL.revokeObjectURL(f.url));
  state.files = [];
  renderGallery();
  controls.classList.remove('visible');
  showToast('Cleared all mockups');
});

/* ============================================================
   Control changes — re-render with new animation / frame / glow
   ============================================================ */
animSelect.addEventListener('change', (e) => {
  state.animation = e.target.value;
  renderGallery();
});
frameSelect.addEventListener('change', (e) => {
  state.frame = e.target.value;
  renderGallery();
});
glowSelect.addEventListener('change', (e) => {
  state.glow = e.target.value;
  renderGallery();
});

/* ============================================================
   Toast
   ============================================================ */
function showToast(message, type = '') {
  const toast = document.createElement('div');
  toast.className = 'toast ' + type;
  toast.textContent = message;
  toastContainer.appendChild(toast);
  setTimeout(() => toast.remove(), 3000);
}

/* ============================================================
   Init — show a sample mockup to demonstrate
   ============================================================ */
(function initSample() {
  // Use a tiny data-URI gradient as a sample screen so the page
  // doesn't look empty before the user uploads anything.
  const sampleCanvas = document.createElement('canvas');
  sampleCanvas.width = 540; sampleCanvas.height = 1080;
  const ctx = sampleCanvas.getContext('2d');
  const grad = ctx.createLinearGradient(0, 0, 540, 1080);
  grad.addColorStop(0, '#8b5cf6');
  grad.addColorStop(0.5, '#ec4899');
  grad.addColorStop(1, '#06b6d4');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, 540, 1080);
  ctx.fillStyle = 'rgba(255,255,255,0.9)';
  ctx.font = 'bold 60px Inter, sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText('Pixel 10', 270, 520);
  ctx.font = '28px Inter, sans-serif';
  ctx.fillText('Your content here', 270, 580);

  const sampleUrl = sampleCanvas.toDataURL('image/png');
  state.files.push({
    id: 'm_sample',
    file: null,
    url: sampleUrl,
    type: 'image',
    name: 'sample',
  });
  controls.classList.add('visible');
  renderGallery();
})();
</script>
