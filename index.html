<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Pixel Mock Studio — M3 Expressive</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Roboto+Flex:opsz,wght@8..144,300..900&family=Roboto+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/mp4-muxer@5.2.1/build/mp4-muxer.min.js"></script>
<style>
/* ============================================================
   PIXEL MOCK STUDIO — Material 3 Expressive
   Token-driven · spring motion · expressive shape scale
   ============================================================ */

/* ---- M3 Color tokens (dark scheme, violet seed) ---- */
:root {
  /* Primary */
  --md-sys-color-primary: #cfbcff;
  --md-sys-color-on-primary: #381e72;
  --md-sys-color-primary-container: #4f378a;
  --md-sys-color-on-primary-container: #ecdcff;
  --md-sys-color-primary-fixed: #eaddff;
  --md-sys-color-primary-fixed-dim: #cfbcff;

  /* Secondary */
  --md-sys-color-secondary: #d0c3ea;
  --md-sys-color-on-secondary: #352e4b;
  --md-sys-color-secondary-container: #4c4463;
  --md-sys-color-on-secondary-container: #ecdcff;

  /* Tertiary */
  --md-sys-color-tertiary: #f4b4ce;
  --md-sys-color-on-tertiary: #4c2539;
  --md-sys-color-tertiary-container: #663b50;
  --md-sys-color-on-tertiary-container: #ffd9e3;

  /* Error */
  --md-sys-color-error: #ffb4ab;
  --md-sys-color-on-error: #690005;
  --md-sys-color-error-container: #93000a;
  --md-sys-color-on-error-container: #ffdad6;

  /* Surfaces (dark) */
  --md-sys-color-surface: #141218;
  --md-sys-color-on-surface: #e6e0e9;
  --md-sys-color-surface-dim: #141218;
  --md-sys-color-surface-bright: #3b383f;
  --md-sys-color-surface-container-lowest: #0f0d13;
  --md-sys-color-surface-container-low: #1c1b1f;
  --md-sys-color-surface-container: #201f23;
  --md-sys-color-surface-container-high: #2b292e;
  --md-sys-color-surface-container-highest: #36343a;
  --md-sys-color-on-surface-variant: #c9c5d0;
  --md-sys-color-outline: #948f99;
  --md-sys-color-outline-variant: #49454e;

  /* Inverse */
  --md-sys-color-inverse-surface: #e6e0e9;
  --md-sys-color-inverse-on-surface: #322f35;
  --md-sys-color-inverse-primary: #6a4ea3;

  /* M3 Expressive shape scale */
  --md-sys-shape-corner-none: 0;
  --md-sys-shape-corner-xs: 4px;
  --md-sys-shape-corner-sm: 8px;
  --md-sys-shape-corner-md: 12px;
  --md-sys-shape-corner-lg: 16px;
  --md-sys-shape-corner-xl: 28px;
  --md-sys-shape-corner-2xl: 36px;
  --md-sys-shape-corner-full: 9999px;

  /* M3 Elevation (dark) — tonal, not just shadow */
  --md-sys-elevation-0: none;
  --md-sys-elevation-1: 0 1px 3px rgba(0,0,0,0.4), 0 1px 2px rgba(0,0,0,0.3);
  --md-sys-elevation-2: 0 2px 6px rgba(0,0,0,0.4), 0 1px 2px rgba(0,0,0,0.3);
  --md-sys-elevation-3: 0 6px 12px rgba(0,0,0,0.45), 0 4px 6px rgba(0,0,0,0.3);
  --md-sys-elevation-4: 0 12px 24px rgba(0,0,0,0.5), 0 6px 8px rgba(0,0,0,0.3);
  --md-sys-elevation-5: 0 18px 36px rgba(0,0,0,0.55), 0 10px 14px rgba(0,0,0,0.3);

  /* M3 Expressive motion — spring-based easings */
  --md-sys-motion-easing-standard: cubic-bezier(0.2, 0, 0, 1);
  --md-sys-motion-easing-emphasized: cubic-bezier(0.2, 0, 0, 1);
  --md-sys-motion-easing-emphasized-decelerate: cubic-bezier(0.05, 0.7, 0.1, 1);
  --md-sys-motion-easing-emphasized-accelerate: cubic-bezier(0.3, 0, 0.8, 0.15);
  --md-sys-motion-easing-spring: cubic-bezier(0.45, 1.4, 0.4, 1);
  --md-sys-motion-easing-bounce: cubic-bezier(0.34, 1.56, 0.64, 1);
  --md-sys-motion-duration-short1: 100ms;
  --md-sys-motion-duration-short2: 150ms;
  --md-sys-motion-duration-short3: 200ms;
  --md-sys-motion-duration-short4: 250ms;
  --md-sys-motion-duration-medium1: 300ms;
  --md-sys-motion-duration-medium2: 400ms;
  --md-sys-motion-duration-medium3: 500ms;
  --md-sys-motion-duration-long1: 600ms;
  --md-sys-motion-duration-long2: 800ms;

  /* M3 Type scale (Roboto Flex) */
  --md-sys-typescale-display-large: 600 57px/64px 'Roboto Flex', sans-serif;
  --md-sys-typescale-display-medium: 600 48px/56px 'Roboto Flex', sans-serif;
  --md-sys-typescale-display-small: 600 36px/44px 'Roboto Flex', sans-serif;
  --md-sys-typescale-headline-large: 600 32px/40px 'Roboto Flex', sans-serif;
  --md-sys-typescale-headline-medium: 600 28px/36px 'Roboto Flex', sans-serif;
  --md-sys-typescale-headline-small: 600 24px/32px 'Roboto Flex', sans-serif;
  --md-sys-typescale-title-large: 500 22px/28px 'Roboto Flex', sans-serif;
  --md-sys-typescale-title-medium: 500 16px/24px 'Roboto Flex', sans-serif;
  --md-sys-typescale-title-small: 500 14px/20px 'Roboto Flex', sans-serif;
  --md-sys-typescale-body-large: 400 16px/24px 'Roboto Flex', sans-serif;
  --md-sys-typescale-body-medium: 400 14px/20px 'Roboto Flex', sans-serif;
  --md-sys-typescale-body-small: 400 12px/16px 'Roboto Flex', sans-serif;
  --md-sys-typescale-label-large: 500 14px/20px 'Roboto Flex', sans-serif;
  --md-sys-typescale-label-medium: 500 12px/16px 'Roboto Flex', sans-serif;
  --md-sys-typescale-label-small: 500 11px/16px 'Roboto Flex', sans-serif;
}

/* ---- Reset ---- */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  background: var(--md-sys-color-surface);
  color: var(--md-sys-color-on-surface);
  font-family: 'Roboto Flex', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  font: var(--md-sys-typescale-body-large);
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
  overflow-x: hidden;
}

/* ---- Ambient decorative gradient (M3E style: subtle, behind everything) ---- */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background:
    radial-gradient(ellipse 800px 500px at 15% 10%, rgba(207, 188, 255, 0.08), transparent 60%),
    radial-gradient(ellipse 600px 500px at 85% 30%, rgba(244, 180, 206, 0.06), transparent 60%),
    radial-gradient(ellipse 700px 400px at 50% 100%, rgba(207, 188, 255, 0.05), transparent 60%);
  z-index: -2;
  pointer-events: none;
  animation: ambientFloat 24s ease-in-out infinite alternate;
}
@keyframes ambientFloat {
  0%   { transform: translate(0, 0); }
  100% { transform: translate(30px, -20px); }
}

/* ============================================================
   LAYOUT CONTAINER
   ============================================================ */
.app-shell {
  max-width: 1200px;
  margin: 0 auto;
  padding: 32px 24px 80px;
  display: flex;
  flex-direction: column;
  gap: 28px;
}

/* ============================================================
   TOP APP BAR (M3E style: title + chip)
   ============================================================ */
.top-bar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
  flex-wrap: wrap;
  padding: 4px 0;
}
.top-bar-left {
  display: flex;
  align-items: center;
  gap: 16px;
}
.app-logo {
  width: 48px;
  height: 48px;
  border-radius: var(--md-sys-shape-corner-md);
  background: var(--md-sys-color-primary-container);
  color: var(--md-sys-color-on-primary-container);
  display: flex;
  align-items: center;
  justify-content: center;
  font: var(--md-sys-typescale-headline-small);
  box-shadow: var(--md-sys-elevation-1);
}
.app-titles h1 {
  font: var(--md-sys-typescale-headline-medium);
  letter-spacing: -0.5px;
  color: var(--md-sys-color-on-surface);
}
.app-titles p {
  font: var(--md-sys-typescale-body-medium);
  color: var(--md-sys-color-on-surface-variant);
  margin-top: 2px;
}

/* M3E status chip */
.assist-chip {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 8px 16px;
  height: 36px;
  border-radius: var(--md-sys-shape-corner-sm);
  border: 1px solid var(--md-sys-color-outline-variant);
  background: transparent;
  color: var(--md-sys-color-on-surface-variant);
  font: var(--md-sys-typescale-label-large);
  cursor: default;
  transition: background var(--md-sys-motion-duration-short3) var(--md-sys-motion-easing-standard);
}
.assist-chip:hover { background: color-mix(in srgb, var(--md-sys-color-on-surface) 8%, transparent); }
.assist-chip .dot {
  width: 8px; height: 8px;
  background: var(--md-sys-color-tertiary);
  border-radius: 50%;
  align-self: center;
}

/* ============================================================
   UPLOAD CARD (M3E filled card with drag state)
   ============================================================ */
.upload-card {
  background: var(--md-sys-color-surface-container-high);
  border-radius: var(--md-sys-shape-corner-xl);
  padding: 56px 32px;
  text-align: center;
  cursor: pointer;
  transition:
    background var(--md-sys-motion-duration-medium2) var(--md-sys-motion-easing-emphasized),
    box-shadow var(--md-sys-motion-duration-medium2) var(--md-sys-motion-easing-emphasized),
    transform var(--md-sys-motion-duration-medium2) var(--md-sys-motion-easing-spring);
  border: 2px dashed transparent;
  position: relative;
  overflow: hidden;
}
.upload-card::before {
  content: '';
  position: absolute;
  inset: 0;
  border-radius: inherit;
  border: 2px dashed var(--md-sys-color-outline-variant);
  pointer-events: none;
  transition: border-color var(--md-sys-motion-duration-medium2) var(--md-sys-motion-easing-emphasized);
}
.upload-card:hover {
  background: var(--md-sys-color-surface-container-highest);
  box-shadow: var(--md-sys-elevation-2);
  transform: translateY(-2px);
}
.upload-card:hover::before { border-color: var(--md-sys-color-primary); }
.upload-card.dragging {
  background: var(--md-sys-color-primary-container);
  transform: scale(1.01);
  box-shadow: var(--md-sys-elevation-3);
}
.upload-card.dragging::before { border-color: var(--md-sys-color-primary); }

.upload-icon-wrap {
  width: 80px; height: 80px;
  margin: 0 auto 24px;
  border-radius: var(--md-sys-shape-corner-full);
  background: var(--md-sys-color-primary-container);
  color: var(--md-sys-color-on-primary-container);
  display: flex;
  align-items: center;
  justify-content: center;
  transition: transform var(--md-sys-motion-duration-medium2) var(--md-sys-motion-easing-spring);
}
.upload-card:hover .upload-icon-wrap { transform: scale(1.08) rotate(-4deg); }
.upload-icon-wrap svg { width: 36px; height: 36px; }

.upload-title {
  font: var(--md-sys-typescale-title-large);
  color: var(--md-sys-color-on-surface);
  margin-bottom: 8px;
}
.upload-subtitle {
  font: var(--md-sys-typescale-body-medium);
  color: var(--md-sys-color-on-surface-variant);
  margin-bottom: 24px;
}
.upload-formats {
  display: inline-flex;
  gap: 8px;
  flex-wrap: wrap;
  justify-content: center;
}
.format-chip {
  font: var(--md-sys-typescale-label-small);
  padding: 4px 12px;
  background: var(--md-sys-color-surface-container-highest);
  color: var(--md-sys-color-on-surface-variant);
  border-radius: var(--md-sys-shape-corner-full);
  letter-spacing: 0.5px;
  text-transform: uppercase;
}

#fileInput { display: none; }

/* ============================================================
   CONTROLS ROW (M3E segmented buttons + dropdowns)
   ============================================================ */
.controls-bar {
  display: none;
  flex-direction: column;
  gap: 16px;
  background: var(--md-sys-color-surface-container-low);
  border-radius: var(--md-sys-shape-corner-xl);
  padding: 20px 24px;
  box-shadow: var(--md-sys-elevation-1);
}
.controls-bar.visible {
  display: flex;
  animation: slideDown var(--md-sys-motion-duration-medium2) var(--md-sys-motion-easing-emphasized);
}
@keyframes slideDown {
  from { opacity: 0; transform: translateY(-12px); }
  to   { opacity: 1; transform: translateY(0); }
}

.controls-row {
  display: flex;
  gap: 20px;
  flex-wrap: wrap;
  align-items: flex-end;
}

.control-group {
  display: flex;
  flex-direction: column;
  gap: 8px;
  min-width: 0;
}
.control-group label {
  font: var(--md-sys-typescale-label-medium);
  color: var(--md-sys-color-on-surface-variant);
  letter-spacing: 0.5px;
  padding-left: 16px;
  text-transform: uppercase;
  font-weight: 500;
}

/* M3E outlined select (treated like an outlined text field) */
.m3-select {
  appearance: none;
  -webkit-appearance: none;
  background: var(--md-sys-color-surface-container-high);
  color: var(--md-sys-color-on-surface);
  border: 1px solid var(--md-sys-color-outline-variant);
  border-radius: var(--md-sys-shape-corner-sm);
  padding: 0 40px 0 16px;
  font: var(--md-sys-typescale-body-large);
  font-family: inherit;
  cursor: pointer;
  outline: none;
  min-width: 180px;
  height: 56px;
  display: flex;
  align-items: center;
  background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='14' height='14' viewBox='0 0 12 12' fill='%23c9c5d0'><path d='M2 4l4 4 4-4z'/></svg>");
  background-repeat: no-repeat;
  background-position: right 16px center;
  transition:
    border-color var(--md-sys-motion-duration-short3) var(--md-sys-motion-easing-standard),
    background var(--md-sys-motion-duration-short3) var(--md-sys-motion-easing-standard);
}
.m3-select:hover { border-color: var(--md-sys-color-on-surface); }
.m3-select:focus {
  border-color: var(--md-sys-color-primary);
  border-width: 2px;
  padding-right: 39px;
}

/* ---- M3E Buttons ---- */
.m3-btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  padding: 0 24px;
  border-radius: var(--md-sys-shape-corner-lg);
  font: var(--md-sys-typescale-label-large);
  font-family: inherit;
  border: none;
  cursor: pointer;
  transition:
    background var(--md-sys-motion-duration-short3) var(--md-sys-motion-easing-standard),
    box-shadow var(--md-sys-motion-duration-short3) var(--md-sys-motion-easing-standard),
    transform var(--md-sys-motion-duration-short2) var(--md-sys-motion-easing-spring);
  white-space: nowrap;
  height: 56px;
  min-width: 160px;
}
.m3-btn:active { transform: scale(0.96); }
.m3-btn:disabled { opacity: 0.5; cursor: not-allowed; }

.m3-btn.filled {
  background: var(--md-sys-color-primary);
  color: var(--md-sys-color-on-primary);
}
.m3-btn.filled:hover {
  background: color-mix(in srgb, var(--md-sys-color-primary) 90%, white);
  box-shadow: var(--md-sys-elevation-1);
}

.m3-btn.tonal {
  background: var(--md-sys-color-secondary-container);
  color: var(--md-sys-color-on-secondary-container);
}
.m3-btn.tonal:hover {
  background: color-mix(in srgb, var(--md-sys-color-secondary-container) 85%, white);
  box-shadow: var(--md-sys-elevation-1);
}

.m3-btn.outlined {
  background: transparent;
  border: 1px solid var(--md-sys-color-outline);
  color: var(--md-sys-color-primary);
}
.m3-btn.outlined:hover {
  background: color-mix(in srgb, var(--md-sys-color-primary) 8%, transparent);
}

.m3-btn.danger {
  background: var(--md-sys-color-error-container);
  color: var(--md-sys-color-on-error-container);
}
.m3-btn.danger:hover {
  background: color-mix(in srgb, var(--md-sys-color-error-container) 85%, white);
  box-shadow: var(--md-sys-elevation-1);
}

.m3-btn svg { width: 18px; height: 18px; }

/* Tightly grouped button cluster (Download All + Clear All) */
.button-group {
  display: flex;
  gap: 12px;
  align-items: flex-end;
  margin-left: auto;
}

/* ============================================================
   GALLERY GRID
   ============================================================ */
.gallery {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 40px 32px;
  min-height: 0;
  padding: 16px 0;
}
.gallery:empty::before {
  content: '';
  display: block;
  width: 80px;
  height: 80px;
  margin: 0 auto 24px;
  border-radius: 50%;
  background: var(--md-sys-color-surface-container-high);
  background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='36' height='36' viewBox='0 0 24 24' fill='%23948f99'><path d='M21 19V5c0-1.1-.9-2-2-2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2zM8.5 13.5l2.5 3.01L14.5 12l4.5 6H5l3.5-4.5z'/></svg>");
  background-repeat: no-repeat;
  background-position: center;
}
.gallery:empty {
  display: block;
  text-align: center;
  color: var(--md-sys-color-on-surface-variant);
  padding: 60px 20px;
  font: var(--md-sys-typescale-body-large);
  min-height: 200px;
}
.gallery:empty::after {
  content: 'Your mockups will appear here';
  display: block;
  margin-top: 0;
}

.mockup-cell {
  position: relative;
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 600px;
  padding: 24px;
  perspective: 900px;
  animation: cellEnter var(--md-sys-motion-duration-long1) var(--md-sys-motion-easing-bounce) both;
}
@keyframes cellEnter {
  from { opacity: 0; transform: translateY(24px) scale(0.95); }
  to   { opacity: 1; transform: translateY(0) scale(1); }
}

/* Static phone stage — what you see is what you get */
.mockup-stage {
  position: relative;
  width: 280px;
  height: 580px;
  transition: transform var(--md-sys-motion-duration-medium2) var(--md-sys-motion-easing-spring);
  transform-style: preserve-3d;
}
.mockup-cell:hover .mockup-stage {
  transform: translateY(-6px);
}

/* Angled view — perspective is set on .mockup-cell, so here we only apply rotation */
.mockup-cell.view-angled .mockup-stage {
  transform: rotateY(-32deg) rotateX(5deg);
  transform-style: preserve-3d;
}
.mockup-cell.view-angled:hover .mockup-stage {
  transform: rotateY(-32deg) rotateX(5deg) translateY(-6px);
}
/* Show the side edge (phone-buttons) more prominently when angled */
.mockup-cell.view-angled .phone-buttons {
  right: -5px;
  width: 6px;
}
.mockup-cell.view-angled .btn-power,
.mockup-cell.view-angled .btn-volume {
  width: 6px;
}

/* ---- Pixel 10 Phone Body ---- */
.phone {
  position: absolute;
  inset: 0;
  border-radius: 38px;
  padding: 7px;
  background: linear-gradient(145deg, #2a2a2e, #0f0f12);
  box-shadow:
    inset 0 0 0 1px rgba(255, 255, 255, 0.08),
    0 0 0 1px rgba(0, 0, 0, 0.6),
    0 30px 60px rgba(0, 0, 0, 0.55),
    0 12px 24px rgba(0, 0, 0, 0.4);
  transform-style: preserve-3d;
}
.phone.frame-obsidian { background: linear-gradient(145deg, #2a2a2e, #0f0f12); }
.phone.frame-porcelain { background: linear-gradient(145deg, #f5f5f0, #d4d4cc); }
.phone.frame-rose { background: linear-gradient(145deg, #e8a5b8, #b86d80); }
.phone.frame-hazel { background: linear-gradient(145deg, #c9b896, #8a7858); }

/* ---- Phone depth via single back face ---- */
/* A duplicate of the phone body pushed 18px back in Z space.
   When the phone is rotated in angled view, the gap between the
   front face and this back face becomes visible as the phone's
   side edge. Because both faces share the same border-radius,
   the corners match perfectly — no artifacts. */
.phone::before {
  content: '';
  position: absolute;
  inset: 0;
  border-radius: 38px;
  transform: translateZ(-18px);
  background: linear-gradient(145deg, #0a0a0c, #050507);
}
.phone.frame-obsidian::before  { background: linear-gradient(145deg, #0a0a0c, #050507); }
.phone.frame-porcelain::before { background: linear-gradient(145deg, #c8c8c0, #a8a8a0); }
.phone.frame-rose::before      { background: linear-gradient(145deg, #a85a70, #884560); }
.phone.frame-hazel::before     { background: linear-gradient(145deg, #786a4f, #5a4d38); }

.phone-screen {
  position: relative;
  width: 100%;
  height: 100%;
  border-radius: 32px;
  overflow: hidden;
  background: #000;
  box-shadow: inset 0 0 0 1px rgba(0, 0, 0, 0.8);
}
.phone-screen img,
.phone-screen video {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
}

/* Punch-hole front camera */
.punch-hole {
  position: absolute;
  top: 14px;
  left: 50%;
  transform: translateX(-50%);
  width: 10px;
  height: 10px;
  background: #000;
  border-radius: 50%;
  box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.15);
  z-index: 5;
}

/* Side buttons */
.phone-buttons {
  position: absolute;
  top: 0;
  bottom: 0;
  right: -3px;
  width: 4px;
}
.btn-power {
  position: absolute;
  right: 0;
  top: 28%;
  width: 4px;
  height: 70px;
  background: linear-gradient(90deg, #1a1a1d, #3a3a3e);
  border-radius: 0 2px 2px 0;
}
.btn-volume {
  position: absolute;
  right: 0;
  top: 42%;
  width: 4px;
  height: 50px;
  background: linear-gradient(90deg, #1a1a1d, #3a3a3e);
  border-radius: 0 2px 2px 0;
}

/* ---- Hover actions ---- */
.mockup-actions {
  position: absolute;
  top: 12px;
  right: 12px;
  display: flex;
  flex-direction: column;
  gap: 6px;
  opacity: 0;
  transform: translateX(8px);
  transition:
    opacity var(--md-sys-motion-duration-short3) var(--md-sys-motion-easing-standard),
    transform var(--md-sys-motion-duration-short3) var(--md-sys-motion-easing-spring);
  z-index: 10;
}
.mockup-cell:hover .mockup-actions {
  opacity: 1;
  transform: translateX(0);
}
.icon-btn {
  width: 36px; height: 36px;
  background: var(--md-sys-color-surface-container-highest);
  border: 1px solid var(--md-sys-color-outline-variant);
  border-radius: var(--md-sys-shape-corner-full);
  color: var(--md-sys-color-on-surface);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: inherit;
  transition:
    background var(--md-sys-motion-duration-short3) var(--md-sys-motion-easing-standard),
    transform var(--md-sys-motion-duration-short2) var(--md-sys-motion-easing-spring);
}
.icon-btn:hover {
  background: var(--md-sys-color-primary-container);
  color: var(--md-sys-color-on-primary-container);
  transform: scale(1.08);
}
.icon-btn:active { transform: scale(0.92); }
.icon-btn svg { width: 18px; height: 18px; }

/* ============================================================
   SNACKBAR (M3)
   ============================================================ */
.snackbar-container {
  position: fixed;
  bottom: 24px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 1000;
  display: flex;
  flex-direction: column;
  gap: 8px;
  align-items: center;
  pointer-events: none;
}
.snackbar {
  background: var(--md-sys-color-inverse-surface);
  color: var(--md-sys-color-inverse-on-surface);
  padding: 14px 20px;
  border-radius: var(--md-sys-shape-corner-xs);
  font: var(--md-sys-typescale-label-large);
  box-shadow: var(--md-sys-elevation-3);
  animation: snackbarIn var(--md-sys-motion-duration-medium1) var(--md-sys-motion-easing-emphasized),
             snackbarOut var(--md-sys-motion-duration-medium1) var(--md-sys-motion-easing-emphasized-accelerate) 2.7s forwards;
  display: flex;
  align-items: center;
  gap: 10px;
}
@keyframes snackbarIn {
  from { opacity: 0; transform: translateY(40px); }
  to   { opacity: 1; transform: translateY(0); }
}
@keyframes snackbarOut {
  to { opacity: 0; transform: translateY(40px); }
}

/* ============================================================
   FOOTER
   ============================================================ */
.app-footer {
  text-align: center;
  padding: 24px 20px;
  color: var(--md-sys-color-on-surface-variant);
  font: var(--md-sys-typescale-body-small);
  border-top: 1px solid var(--md-sys-color-outline-variant);
  margin-top: 24px;
}

/* ============================================================
   RESPONSIVE
   ============================================================ */
@media (max-width: 640px) {
  .app-shell { padding: 20px 16px 60px; gap: 24px; }
  .top-bar-left { gap: 12px; }
  .app-logo { width: 40px; height: 40px; }
  .app-titles h1 { font: var(--md-sys-typescale-headline-small); }
  .upload-card { padding: 36px 20px; }
  .gallery { grid-template-columns: 1fr; gap: 24px; }
  .controls-bar { padding: 16px; }
  .controls-row { gap: 12px; }
  .m3-select { min-width: 140px; flex: 1; }
}

/* Reduced motion */
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    animation-duration: 0.01ms !important;
    animation-iteration-count: 1 !important;
    transition-duration: 0.01ms !important;
  }
}
</style>

<footer class="app-footer">
  Material 3 Expressive · Pure CSS Pixel 10 mockups · All processing happens in your browser

<script>
/* ============================================================
   PIXEL MOCK STUDIO — Static, WYSIWYG mockups

   Design principle: what you see in the preview is EXACTLY what
   you get in the downloaded PNG. Both the on-screen phone and
   the exported PNG are drawn from the same pixel-perfect spec:
   - Phone: 280×580, 38px outer radius, 7px bezel, 32px screen radius
   - Image: object-fit: cover (calculated identically for CSS + canvas)
   - No 3D transforms, no html2canvas
   ============================================================ */

/* Phone spec — single source of truth for both preview and export */
const PHONE_SPEC = {
  width: 280,
  height: 580,
  outerRadius: 38,
  bezel: 7,
  screenRadius: 32,
  punchHole: { cx: 140, cy: 22, r: 5 },
  buttons: { right: 280, powerY: 162, powerH: 70, volumeY: 244, volumeH: 50, w: 4 },
  shadow: '0 30px 60px rgba(0,0,0,0.55), 0 12px 24px rgba(0,0,0,0.4)',
};

const FRAME_GRADIENTS = {
  obsidian:  ['#2a2a2e', '#0f0f12'],
  porcelain: ['#f5f5f0', '#d4d4cc'],
  rose:      ['#e8a5b8', '#b86d80'],
  hazel:     ['#c9b896', '#8a7858'],
};

/* Angled-view transform parameters — must match the CSS .view-angled rule
   and the inline transform in renderAngledViaSvg() */
const ANGLED_SPEC = {
  // Matches: perspective(900px) rotateY(-32deg) rotateX(5deg)
  perspective: 900,
  rotateY: -32,   // degrees (negative = tilt left, showing right edge)
  rotateX: 5,     // degrees (slight downward tilt)
};

/* ============================================================
   State
   ============================================================ */
const state = {
  files: [],
  frame: 'obsidian',
  view: 'front',
};

/* ============================================================
   DOM refs
   ============================================================ */
const uploadCard     = document.getElementById('uploadCard');
const fileInput      = document.getElementById('fileInput');
const gallery        = document.getElementById('gallery');
const controlsBar    = document.getElementById('controlsBar');
const viewSelect     = document.getElementById('viewSelect');
const frameSelect    = document.getElementById('frameSelect');
const downloadAllBtn = document.getElementById('downloadAllBtn');
const clearAllBtn    = document.getElementById('clearAllBtn');
const snackbarContainer = document.getElementById('snackbarContainer');

/* ============================================================
   File upload
   ============================================================ */
uploadCard.addEventListener('click', () => fileInput.click());
fileInput.addEventListener('change', (e) => handleFiles(e.target.files));

['dragenter', 'dragover'].forEach(evt =>
  uploadCard.addEventListener(evt, (e) => {
    e.preventDefault();
    e.stopPropagation();
    uploadCard.classList.add('dragging');
  })
);
['dragleave', 'drop'].forEach(evt =>
  uploadCard.addEventListener(evt, (e) => {
    e.preventDefault();
    e.stopPropagation();
    uploadCard.classList.remove('dragging');
  })
);
uploadCard.addEventListener('drop', (e) => {
  const files = e.dataTransfer.files;
  if (files && files.length) handleFiles(files);
});

function handleFiles(fileList) {
  const accepted = [];
  for (const f of fileList) {
    if (!f.type.startsWith('image/') && !f.type.startsWith('video/')) {
      showSnackbar(`Skipped: ${f.name} (unsupported)`, 'error');
      continue;
    }
    accepted.push({
      id: 'm_' + Math.random().toString(36).slice(2, 10),
      file: f,
      url: URL.createObjectURL(f),
      type: f.type.startsWith('video/') ? 'video' : 'image',
      name: f.name,
    });
  }
  if (!accepted.length) return;
  state.files.push(...accepted);
  controlsBar.classList.add('visible');
  renderGallery();
  showSnackbar(`Added ${accepted.length} mockup${accepted.length > 1 ? 's' : ''}`);
}

/* ============================================================
   Render gallery
   ============================================================ */
function renderGallery() {
  gallery.innerHTML = '';
  state.files.forEach((item, idx) => {
    gallery.appendChild(buildMockupCell(item, idx));
  });
}

function buildMockupCell(item, idx) {
  const cell = document.createElement('div');
  cell.className = 'mockup-cell view-' + state.view;
  cell.dataset.id = item.id;
  cell.style.animationDelay = (idx * 0.08) + 's';

  const mediaEl = item.type === 'video'
    ? `<video src="${item.url}" autoplay muted loop playsinline></video>`
    : `<img src="${item.url}" alt="${item.name}" />`;

  cell.innerHTML = `
    <div class="mockup-stage">
      <div class="phone frame-${state.frame}">
        <div class="phone-screen">
          ${mediaEl}
          <div class="punch-hole"></div>
        </div>
      </div>
      <div class="phone-buttons">
        <div class="btn-power"></div>
        <div class="btn-volume"></div>
      </div>
    </div>
    <div class="mockup-actions">
      <button class="icon-btn" title="Download PNG" data-action="download" aria-label="Download">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/></svg>
      </button>
      <button class="icon-btn" title="Remove" data-action="remove" aria-label="Remove">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
      </button>
    </div>
  `;

  cell.querySelectorAll('.icon-btn').forEach(btn => {
    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      const action = btn.dataset.action;
      if (action === 'download') downloadMockup(item);
      if (action === 'remove')   removeMockup(item.id);
    });
  });

  return cell;
}

/* ============================================================
   Remove
   ============================================================ */
function removeMockup(id) {
  const item = state.files.find(f => f.id === id);
  if (item && item.url.startsWith('blob:')) URL.revokeObjectURL(item.url);
  state.files = state.files.filter(f => f.id !== id);
  renderGallery();
  if (!state.files.length) controlsBar.classList.remove('visible');
}

/* ============================================================
   Download — routes to video or PNG export based on item type
   ============================================================ */
async function downloadMockup(item) {
  if (item.type === 'video') {
    await downloadVideoMockup(item);
  } else {
    await downloadImageMockup(item);
  }
}

/* Download as PNG (for images) */
async function downloadImageMockup(item) {
  showSnackbar('Rendering PNG…');

  let img;
  try {
    img = await loadImage(item.url);
  } catch (err) {
    console.error(err);
    showSnackbar('Could not load image', 'error');
    return;
  }

  if (state.view === 'front') {
    const canvas = renderFlatPhone(img);
    triggerDownload(canvas, item.name);
  } else {
    try {
      const canvas = await renderAngledViaSvg(img);
      triggerDownload(canvas, item.name);
    } catch (err) {
      console.error('Angled export failed, falling back to front:', err);
      const canvas = renderFlatPhone(img);
      triggerDownload(canvas, item.name);
    }
  }
}

/* ============================================================
   Download as video (MP4/WebM) using MediaRecorder API

   Records a canvas stream while playing the source video,
   drawing each frame into the phone mockup. For front view,
   draws directly. For angled view, renders the flat phone to
   an off-screen canvas, then draws it with perspective strips
   + a back-face for 3D depth.
   ============================================================ */

/* Get the best supported video MIME type for MediaRecorder */
function getSupportedVideoMime() {
  const types = [
    'video/mp4;codecs=h264',
    'video/mp4',
    'video/webm;codecs=vp9',
    'video/webm;codecs=vp8',
    'video/webm',
  ];
  for (const type of types) {
    if (window.MediaRecorder && MediaRecorder.isTypeSupported(type)) return type;
  }
  return 'video/webm';
}

/* Back-face colors (darker shade of frame) for 3D depth in video */
const BACK_FACE_COLORS = {
  obsidian:  ['#0a0a0c', '#050507'],
  porcelain: ['#c8c8c0', '#a8a8a0'],
  rose:      ['#a85a70', '#884560'],
  hazel:     ['#786a4f', '#5a4d38'],
};

async function downloadVideoMockup(item) {
  // Check for WebCodecs support (fast, non-real-time encoding)
  if (typeof VideoEncoder === 'undefined' || typeof VideoFrame === 'undefined') {
    // Fall back to MediaRecorder if WebCodecs isn't available
    return downloadVideoMockupLegacy(item);
  }

  showProgress('Preparing video…', 0);

  // Load the video element
  const video = document.createElement('video');
  video.src = item.url;
  video.muted = true;
  video.playsInline = true;
  video.preload = 'auto';

  try {
    await new Promise((res, rej) => {
      video.onloadeddata = res;
      video.onerror = () => rej(new Error('Video load failed'));
    });
  } catch (err) {
    hideProgress();
    showSnackbar('Could not load video', 'error');
    return;
  }

  const duration = video.duration;
  const fps = 30;

  // Output canvas dimensions — phone fills the ENTIRE frame
  const SCALE = 2;
  const phoneW = PHONE_SPEC.width * SCALE;
  const phoneH = PHONE_SPEC.height * SCALE;

  const usePerspective = state.view === 'angled';
  const angleYRad = 32 * Math.PI / 180;
  const sinA = Math.sin(angleYRad);
  const cosA = Math.cos(angleYRad);
  const PERSP = 900 * SCALE;
  const PHONE_DEPTH = 18 * SCALE;

  let W, H, phoneOutX, phoneOutY;

  if (!usePerspective) {
    W = phoneW;
    H = phoneH;
    phoneOutX = 0;
    phoneOutY = 0;
  } else {
    // Angled view — use the same dimensions as the flat phone.
    // The SVG foreignObject approach handles the 3D transform internally,
    // so the output canvas just needs to match the phone aspect ratio.
    // We use the phone dimensions directly for a fullscreen result.
    W = phoneW;
    H = phoneH;
    // H.264 requires even dimensions
    W = W % 2 === 0 ? W : W + 1;
    H = H % 2 === 0 ? H : H + 1;
    phoneOutX = 0;
    phoneOutY = 0;
  }

  const canvas = document.createElement('canvas');
  canvas.width = W;
  canvas.height = H;
  const ctx = canvas.getContext('2d', { alpha: !usePerspective });

  const flatCanvas = document.createElement('canvas');
  flatCanvas.width = phoneW;
  flatCanvas.height = phoneH;
  const flatCtx = flatCanvas.getContext('2d');

  // Set up mp4-muxer
  // The library exposes itself as window.Mp4Muxer with Muxer, ArrayBufferTarget, etc.
  const { Muxer, ArrayBufferTarget } = window.Mp4Muxer || {};
  if (!Muxer || !ArrayBufferTarget) {
    hideProgress();
    showSnackbar('MP4 muxer library failed to load', 'error');
    return;
  }

  const muxerTarget = new ArrayBufferTarget();
  const muxer = new Muxer({
    target: muxerTarget,
    video: {
      codec: 'avc',
      width: W,
      height: H,
      frameRate: fps,
    },
    fastStart: 'in-memory',
  });

  // Set up VideoEncoder
  let encodedFrames = 0;
  const totalFrames = Math.ceil(duration * fps);

  const encoder = new VideoEncoder({
    output: (chunk, meta) => {
      muxer.addVideoChunk(chunk, meta);
      encodedFrames++;
      const pct = Math.min(99, Math.round((encodedFrames / totalFrames) * 100));
      showProgress(`Encoding… ${pct}%`, pct);
    },
    error: (e) => console.error('Encoder error:', e),
  });

  // Configure encoder for H.264
  encoder.configure({
    codec: 'avc1.640033', // H.264 High profile, level 5.1
    width: W,
    height: H,
    bitrate: 8_000_000,
    framerate: fps,
    latencyMode: 'realtime', // Output encoded frames immediately, don't buffer
  });

  // Process video frames using requestVideoFrameCallback with backpressure.
  showProgress('Encoding… 0%', 0);

  const frameDuration = 1_000_000 / fps; // microseconds per frame
  let frameIdx = 0;

  // Seek to start — use a one-time event listener to avoid stale handlers
  await new Promise((res) => {
    const handler = () => { video.removeEventListener('seeked', handler); res(); };
    video.addEventListener('seeked', handler, { once: true });
    video.currentTime = 0;
  });

  await video.play();

  // Frame capture loop with backpressure: if the encoder queue grows
  // too large, we wait for it to drain before capturing more frames.
  // This prevents the browser tab from crashing on long videos.
  await new Promise((resolve) => {
    let finished = false;
    let lastTime = -1;

    function finish() {
      if (finished) return;
      finished = true;
      resolve();
    }

    // Safety net: if the video ends but rVFC doesn't fire one last time,
    // the 'ended' event ensures we resolve.
    video.addEventListener('ended', finish, { once: true });

    function onFrame(now, metadata) {
      if (finished) return;

      // Only encode if we got a new frame
      if (metadata.mediaTime !== lastTime) {
        lastTime = metadata.mediaTime;

        ctx.clearRect(0, 0, W, H);

        if (!usePerspective) {
          // Front view — draw phone directly
          drawFlatPhone(ctx, video, SCALE, 0);
        } else {
          // Angled view — use SVG foreignObject to match the preview EXACTLY.
          // We render the current video frame to a temp canvas, convert to data URL,
          // then build an SVG with the same CSS 3D transform as the preview.
          // This guarantees the export looks identical to what the user sees.
          // (Async — we'll encode on the next rVFC callback after the SVG loads)
          renderAngledFrameAsync(ctx, video, W, H, SCALE).then(() => {
            if (finished) return;
            const frame = new VideoFrame(canvas, {
              timestamp: frameIdx * frameDuration,
              duration: frameDuration,
            });
            encoder.encode(frame, { keyFrame: frameIdx % 30 === 0 });
            frame.close();
            frameIdx++;

            const pct = Math.min(99, Math.round((video.currentTime / duration) * 100));
            showProgress(`Encoding… ${pct}%`, pct);
          });
          // Skip the synchronous encode below for angled view
          if (typeof video.requestVideoFrameCallback === 'function') {
            video.requestVideoFrameCallback(onFrame);
          } else {
            requestAnimationFrame(() => onFrame(performance.now(), { mediaTime: video.currentTime }));
          }
          return;
        }

        const frame = new VideoFrame(canvas, {
          timestamp: frameIdx * frameDuration,
          duration: frameDuration,
        });
        encoder.encode(frame, { keyFrame: frameIdx % 30 === 0 });
        frame.close();
        frameIdx++;

        const pct = Math.min(99, Math.round((video.currentTime / duration) * 100));
        showProgress(`Encoding… ${pct}%`, pct);
      }

      // Backpressure: if the encoder queue is too large, wait briefly
      // before requesting the next frame. This prevents memory blowup
      // on long videos.
      if (encoder.encodeQueueSize > 5) {
        setTimeout(() => {
          if (!finished) {
            if (typeof video.requestVideoFrameCallback === 'function') {
              video.requestVideoFrameCallback(onFrame);
            } else {
              requestAnimationFrame(() => onFrame(performance.now(), { mediaTime: video.currentTime }));
            }
          }
        }, 10);
      } else {
        if (typeof video.requestVideoFrameCallback === 'function') {
          video.requestVideoFrameCallback(onFrame);
        } else {
          requestAnimationFrame(() => onFrame(performance.now(), { mediaTime: video.currentTime }));
        }
      }
    }

    if (typeof video.requestVideoFrameCallback === 'function') {
      video.requestVideoFrameCallback(onFrame);
    } else {
      requestAnimationFrame(() => onFrame(performance.now(), { mediaTime: video.currentTime }));
    }
  });

  await encoder.flush();
  muxer.finalize();

  // Get the MP4 buffer and download
  const { buffer } = muxerTarget;
  if (!buffer || buffer.byteLength === 0) {
    hideProgress();
    showSnackbar('Encoding failed — try again', 'error');
    encoder.close();
    return;
  }
  const blob = new Blob([buffer], { type: 'video/mp4' });
  const url = URL.createObjectURL(blob);
  const link = document.createElement('a');
  link.download = item.name.replace(/\.[^.]+$/, '') + '-pixel10.mp4';
  link.href = url;
  link.click();
  setTimeout(() => URL.revokeObjectURL(url), 1000);

  encoder.close();
  hideProgress();
  showSnackbar('Downloaded video');
}

/* ============================================================
   Legacy video export using MediaRecorder (fallback)
   ============================================================ */
async function downloadVideoMockupLegacy(item) {
  if (!window.MediaRecorder) {
    showSnackbar('Video export not supported, exporting frame as PNG', 'error');
    const frame = await captureVideoFrame(item.url);
    const img = await loadImage(frame);
    const canvas = state.view === 'front'
      ? renderFlatPhone(img)
      : await renderAngledViaSvg(img).catch(() => renderFlatPhone(img));
    triggerDownload(canvas, item.name);
    return;
  }

  showProgress('Recording video… (this may take a while)', 0);

  const video = document.createElement('video');
  video.src = item.url;
  video.muted = true;
  video.playsInline = true;
  video.preload = 'auto';

  try {
    await new Promise((res, rej) => {
      video.onloadeddata = res;
      video.onerror = () => rej(new Error('Video load failed'));
    });
  } catch (err) {
    hideProgress();
    showSnackbar('Could not load video', 'error');
    return;
  }

  const SCALE = 2;
  const phoneW = PHONE_SPEC.width * SCALE;
  const phoneH = PHONE_SPEC.height * SCALE;
  const usePerspective = state.view === 'angled';

  const W = phoneW;
  const H = phoneH;
  const canvas = document.createElement('canvas');
  canvas.width = W;
  canvas.height = H;
  const ctx = canvas.getContext('2d');

  const mimeType = getSupportedVideoMime();
  const stream = canvas.captureStream(30);
  const recorder = new MediaRecorder(stream, { mimeType, videoBitsPerSecond: 12_000_000 });
  const chunks = [];
  recorder.ondataavailable = e => { if (e.data.size > 0) chunks.push(e.data); };

  const ext = mimeType.includes('mp4') ? 'mp4' : 'webm';
  const recordingDone = new Promise(resolve => {
    recorder.onstop = () => {
      const blob = new Blob(chunks, { type: mimeType.split(';')[0] });
      const url = URL.createObjectURL(blob);
      const link = document.createElement('a');
      link.download = item.name.replace(/\.[^.]+$/, '') + '-pixel10.' + ext;
      link.href = url;
      link.click();
      setTimeout(() => URL.revokeObjectURL(url), 1000);
      resolve();
    };
  });

  video.currentTime = 0;
  await new Promise(res => { video.onseeked = res; });
  await video.play();
  await new Promise(res => requestAnimationFrame(res));

  recorder.start();
  const duration = video.duration;
  const updateProgress = setInterval(() => {
    const pct = Math.min(99, Math.round((video.currentTime / duration) * 100));
    showProgress(`Recording… ${pct}%`, pct);
  }, 200);

  await new Promise(resolve => {
    function drawFrame() {
      if (video.ended) {
        clearInterval(updateProgress);
        setTimeout(() => { if (recorder.state !== 'inactive') recorder.stop(); resolve(); }, 100);
        return;
      }
      ctx.clearRect(0, 0, W, H);
      drawFlatPhone(ctx, video, SCALE, 0);
      requestAnimationFrame(drawFrame);
    }
    drawFrame();
  });

  await recordingDone;
  hideProgress();
  showSnackbar('Downloaded video');
}

/* ============================================================
   Progress indicator
   ============================================================ */
function showProgress(text, pct) {
  let el = document.getElementById('progressOverlay');
  if (!el) {
    el = document.createElement('div');
    el.id = 'progressOverlay';
    el.style.cssText = `
      position: fixed; inset: 0; z-index: 2000;
      background: rgba(20,18,24,0.85); backdrop-filter: blur(8px);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 20px; font-family: 'Roboto Flex', sans-serif;
    `;
    el.innerHTML = `
      <div style="font-size: 16px; color: #e6e0e9; font-weight: 500;" id="progressText">${text}</div>
      <div style="width: 280px; height: 8px; background: #36343a; border-radius: 4px; overflow: hidden;">
        <div id="progressBar" style="width: ${pct}%; height: 100%; background: linear-gradient(90deg, #cfbcff, #f4b4ce); border-radius: 4px; transition: width 0.2s ease;"></div>
      </div>
    `;
    document.body.appendChild(el);
  } else {
    el.querySelector('#progressText').textContent = text;
    el.querySelector('#progressBar').style.width = pct + '%';
    el.style.display = 'flex';
  }
}

function hideProgress() {
  const el = document.getElementById('progressOverlay');
  if (el) el.style.display = 'none';
}

/* ============================================================
   Angled view helpers
   ============================================================ */

/* Render the angled view for a single video frame using SVG foreignObject.
   This is the SAME technique used for the static PNG export, guaranteeing
   the video matches the on-screen preview exactly.

   The video frame is drawn to a temp canvas, converted to a data URL,
   inlined in an SVG with the CSS 3D transform, loaded as an Image,
   and drawn onto the output canvas. */
async function renderAngledFrameAsync(ctx, video, outW, outH, SCALE) {
  // Draw the current video frame into a temp canvas with the phone mockup (flat)
  const phoneW = PHONE_SPEC.width * SCALE;
  const phoneH = PHONE_SPEC.height * SCALE;
  const tempCanvas = document.createElement('canvas');
  tempCanvas.width = phoneW;
  tempCanvas.height = phoneH;
  const tempCtx = tempCanvas.getContext('2d');
  drawFlatPhone(tempCtx, video, SCALE, 0);
  const frameDataUrl = tempCanvas.toDataURL('image/jpeg', 0.85);

  // Compute cover-fit dimensions (same math as renderAngledViaSvg)
  const bezel = PHONE_SPEC.bezel;
  const sw = PHONE_SPEC.width - bezel * 2;
  const sh = PHONE_SPEC.height - bezel * 2;
  const screenAspect = sw / sh;
  const vw = video.videoWidth || 540;
  const vh = video.videoHeight || 960;
  const videoAspect = vw / vh;
  let cssW, cssH, cssX, cssY;
  if (videoAspect > screenAspect) {
    cssH = sh; cssW = sh * videoAspect;
    cssX = bezel - (cssW - sw) / 2; cssY = bezel;
  } else {
    cssW = sw; cssH = sw / videoAspect;
    cssX = bezel; cssY = bezel - (cssH - sh) / 2;
  }

  const [frameC1, frameC2] = FRAME_GRADIENTS[state.frame];
  const [backC1, backC2] = BACK_FACE_COLORS[state.frame];
  const PHONE_DEPTH = 18;

  // Build SVG with PAD=80 (same as PNG export) so the 3D rotation fits
  const PAD = 80;
  const svgW = PHONE_SPEC.width + PAD * 2;
  const svgH = PHONE_SPEC.height + PAD * 2;

  const phoneHtml = `
    <div xmlns="http://www.w3.org/1999/xhtml" style="
      width: ${PHONE_SPEC.width}px;
      height: ${PHONE_SPEC.height}px;
      position: relative;
      margin-left: ${PAD}px;
      margin-top: ${PAD}px;
      transform: perspective(900px) rotateY(-32deg) rotateX(5deg);
      transform-style: preserve-3d;
    ">
      <div style="
        position: absolute; inset: 0;
        border-radius: ${PHONE_SPEC.outerRadius}px;
        transform: translateZ(-${PHONE_DEPTH}px);
        background: linear-gradient(145deg, ${backC1}, ${backC2});
      "></div>
      <div style="
        position: absolute; inset: 0;
        border-radius: ${PHONE_SPEC.outerRadius}px;
        padding: ${bezel}px;
        background: linear-gradient(145deg, ${frameC1}, ${frameC2});
        box-shadow:
          inset 0 0 0 1px rgba(255,255,255,0.08),
          0 0 0 1px rgba(0,0,0,0.6),
          0 30px 60px rgba(0,0,0,0.55),
          0 12px 24px rgba(0,0,0,0.4);
        transform-style: preserve-3d;
      ">
        <div style="
          position: relative; width: 100%; height: 100%;
          border-radius: ${PHONE_SPEC.screenRadius}px;
          overflow: hidden; background: #000;
          box-shadow: inset 0 0 0 1px rgba(0,0,0,0.8);
        ">
          <img src="${frameDataUrl}" style="
            position: absolute;
            width: ${cssW}px; height: ${cssH}px;
            left: ${cssX - bezel}px; top: ${cssY - bezel}px;
            object-fit: fill; display: block;
          " />
          <div style="
            position: absolute; top: 7px; left: 50%;
            transform: translateX(-50%);
            width: 10px; height: 10px;
            background: #000; border-radius: 50%;
            box-shadow: inset 0 0 0 1px rgba(255,255,255,0.15);
          "></div>
        </div>
      </div>
    </div>
  `;

  const SVG_SCALE = 3;
  const svg = `
    <svg xmlns="http://www.w3.org/2000/svg"
         width="${svgW * SVG_SCALE}" height="${svgH * SVG_SCALE}"
         viewBox="0 0 ${svgW} ${svgH}">
      <foreignObject x="0" y="0" width="${svgW}" height="${svgH}">
        ${phoneHtml}
      </foreignObject>
    </svg>
  `;
  const svgDataUrl = 'data:image/svg+xml;charset=utf-8,' + encodeURIComponent(svg);
  const img = await loadImage(svgDataUrl);

  // Fill background with frame color
  const [bgC1, bgC2] = FRAME_GRADIENTS[state.frame];
  const bgGrad = ctx.createLinearGradient(0, 0, outW, outH);
  bgGrad.addColorStop(0, bgC1);
  bgGrad.addColorStop(1, bgC2);
  ctx.fillStyle = bgGrad;
  ctx.fillRect(0, 0, outW, outH);

  // Draw the SVG scaled to fill the output canvas (cover fit)
  const srcW = svgW * SVG_SCALE;
  const srcH = svgH * SVG_SCALE;
  const scaleX = outW / srcW;
  const scaleY = outH / srcH;
  const scale = Math.max(scaleX, scaleY);
  const drawW = srcW * scale;
  const drawH = srcH * scale;
  const drawX = (outW - drawW) / 2;
  const drawY = (outH - drawH) / 2;
  ctx.drawImage(img, drawX, drawY, drawW, drawH);
}

/* Draw the phone's right side edge — the only place where 3D depth
   is visible in the angled view. This connects the front face's right
   edge to the back face's right edge, showing the phone's thickness.
   Drawn as a quad (trapezoid) with a darker shade of the frame color. */
function drawBackFace(ctx, phoneX, phoneY, phoneW, phoneH, sinA, cosA, PERSP, PHONE_DEPTH) {
  const cx = phoneX + phoneW / 2;
  const cy = phoneY + phoneH / 2;

  // Right edge of front face (x = +phoneW/2, z = 0)
  const xFront = phoneW / 2;
  const zFront = xFront * sinA;
  const scaleFront = PERSP / (PERSP - zFront);
  const frontTopY = -phoneH / 2 * scaleFront;
  const frontBotY = phoneH / 2 * scaleFront;
  const frontX = cx + xFront * cosA * scaleFront;

  // Right edge of back face (x = +phoneW/2, z = -PHONE_DEPTH)
  const zBack = xFront * sinA - PHONE_DEPTH;
  const scaleBack = PERSP / (PERSP - zBack);
  const backTopY = -phoneH / 2 * scaleBack;
  const backBotY = phoneH / 2 * scaleBack;
  const backX = cx + xFront * cosA * scaleBack;

  // Draw the side edge as a quad: frontTop, backTop, backBot, frontBot
  const [bc1, bc2] = BACK_FACE_COLORS[state.frame];
  const grad = ctx.createLinearGradient(frontX, 0, backX, 0);
  grad.addColorStop(0, bc1);
  grad.addColorStop(1, bc2);

  ctx.beginPath();
  ctx.moveTo(frontX, cy + frontTopY);
  ctx.lineTo(backX, cy + backTopY);
  ctx.lineTo(backX, cy + backBotY);
  ctx.lineTo(frontX, cy + frontBotY);
  ctx.closePath();
  ctx.fillStyle = grad;
  ctx.fill();
}

/* Draw a source canvas with a perspective transform using vertical strips.
   Uses 200 strips for clean, artifact-free rendering. */
function drawWithPerspective(ctx, srcCanvas, dx, dy, dw, dh, angleYDeg, perspective, strips = 200) {
  const angleY = angleYDeg * Math.PI / 180;
  const cos = Math.cos(angleY);
  const sin = Math.sin(angleY);
  const srcW = srcCanvas.width;
  const srcH = srcCanvas.height;
  const cx = dx + dw / 2;
  const cy = dy + dh / 2;

  for (let i = 0; i < strips; i++) {
    const t0 = i / strips;
    const t1 = (i + 1) / strips;
    const tMid = (t0 + t1) / 2;

    const x = (tMid - 0.5) * dw;
    const xRot = x * cos;
    const z = x * sin;
    const scale = perspective / (perspective - z);

    const projX = xRot * scale;
    const projW = (dw / strips) * cos * scale + 0.5;
    const stripH = dh * scale;
    const stripX = cx + projX - projW / 2;
    const stripY = cy - stripH / 2;

    const sx = srcW * t0;
    const sw = srcW / strips + 1;

    ctx.drawImage(srcCanvas, sx, 0, sw, srcH, stripX, stripY, projW, stripH);
  }
}

/* Render the flat front-view phone to a canvas (used for front view
   and as a fallback for angled view) */
function renderFlatPhone(img) {
  const SCALE = 3;
  const PAD = 40;
  const canvas = document.createElement('canvas');
  canvas.width  = (PHONE_SPEC.width  + PAD * 2) * SCALE;
  canvas.height = (PHONE_SPEC.height + PAD * 2) * SCALE;
  const ctx = canvas.getContext('2d');
  drawFlatPhone(ctx, img, SCALE, PAD);
  return canvas;
}

/* Draw the flat phone onto a given context. Reusable for both static
   PNG export and per-frame video rendering. Accepts any CanvasImageSource
   (Image, VideoElement, Canvas). */
function drawFlatPhone(ctx, img, SCALE, PAD) {
  ctx.save();
  ctx.scale(SCALE, SCALE);
  ctx.translate(PAD, PAD);

  // --- 1. Drop shadow under the phone ---
  ctx.save();
  ctx.shadowColor = 'rgba(0,0,0,0.55)';
  ctx.shadowBlur = 40;
  ctx.shadowOffsetY = 24;
  drawRoundRect(ctx, 0, 0, PHONE_SPEC.width, PHONE_SPEC.height, PHONE_SPEC.outerRadius);
  ctx.fillStyle = '#000';
  ctx.fill();
  ctx.restore();

  // --- 2. Phone body (frame gradient) ---
  const [c1, c2] = FRAME_GRADIENTS[state.frame];
  const grad = ctx.createLinearGradient(0, 0, PHONE_SPEC.width, PHONE_SPEC.height);
  grad.addColorStop(0, c1);
  grad.addColorStop(1, c2);
  drawRoundRect(ctx, 0, 0, PHONE_SPEC.width, PHONE_SPEC.height, PHONE_SPEC.outerRadius);
  ctx.fillStyle = grad;
  ctx.fill();

  // Subtle inner highlight on the frame
  ctx.save();
  drawRoundRect(ctx, 0, 0, PHONE_SPEC.width, PHONE_SPEC.height, PHONE_SPEC.outerRadius);
  ctx.clip();
  ctx.strokeStyle = 'rgba(255,255,255,0.08)';
  ctx.lineWidth = 1;
  drawRoundRect(ctx, 0.5, 0.5, PHONE_SPEC.width - 1, PHONE_SPEC.height - 1, PHONE_SPEC.outerRadius - 0.5);
  ctx.stroke();
  ctx.restore();

  // --- 3. Screen background (black) ---
  const bezel = PHONE_SPEC.bezel;
  const sx = bezel, sy = bezel;
  const sw = PHONE_SPEC.width  - bezel * 2;
  const sh = PHONE_SPEC.height - bezel * 2;

  drawRoundRect(ctx, sx, sy, sw, sh, PHONE_SPEC.screenRadius);
  ctx.fillStyle = '#000';
  ctx.fill();

  // --- 4. User image/video with object-fit: cover math ---
  // For video elements, use videoWidth/videoHeight; for images, naturalWidth/Height
  const imgW = img.videoWidth  || img.naturalWidth  || img.width;
  const imgH = img.videoHeight || img.naturalHeight || img.height;
  const screenAspect = sw / sh;
  const imgAspect = imgW / imgH;
  let drawW, drawH, drawX, drawY;
  if (imgAspect > screenAspect) {
    drawH = sh;
    drawW = sh * imgAspect;
    drawX = sx - (drawW - sw) / 2;
    drawY = sy;
  } else {
    drawW = sw;
    drawH = sw / imgAspect;
    drawX = sx;
    drawY = sy - (drawH - sh) / 2;
  }

  ctx.save();
  drawRoundRect(ctx, sx, sy, sw, sh, PHONE_SPEC.screenRadius);
  ctx.clip();
  ctx.drawImage(img, drawX, drawY, drawW, drawH);
  ctx.restore();

  // Subtle inner shadow on screen edge
  ctx.save();
  drawRoundRect(ctx, sx, sy, sw, sh, PHONE_SPEC.screenRadius);
  ctx.clip();
  ctx.strokeStyle = 'rgba(0,0,0,0.8)';
  ctx.lineWidth = 1;
  drawRoundRect(ctx, sx + 0.5, sy + 0.5, sw - 1, sh - 1, PHONE_SPEC.screenRadius - 0.5);
  ctx.stroke();
  ctx.restore();

  // --- 5. Punch-hole front camera ---
  ctx.beginPath();
  ctx.arc(PHONE_SPEC.punchHole.cx, PHONE_SPEC.punchHole.cy, PHONE_SPEC.punchHole.r, 0, Math.PI * 2);
  ctx.fillStyle = '#000';
  ctx.fill();
  ctx.strokeStyle = 'rgba(255,255,255,0.15)';
  ctx.lineWidth = 1;
  ctx.stroke();

  // --- 6. Side buttons ---
  const btnGrad = ctx.createLinearGradient(PHONE_SPEC.buttons.right, 0,
                                            PHONE_SPEC.buttons.right + PHONE_SPEC.buttons.w, 0);
  btnGrad.addColorStop(0, '#1a1a1d');
  btnGrad.addColorStop(1, '#3a3a3e');
  ctx.fillStyle = btnGrad;
  drawRoundRect(ctx, PHONE_SPEC.buttons.right, PHONE_SPEC.buttons.powerY,
                    PHONE_SPEC.buttons.w, PHONE_SPEC.buttons.powerH, 2);
  ctx.fill();
  drawRoundRect(ctx, PHONE_SPEC.buttons.right, PHONE_SPEC.buttons.volumeY,
                    PHONE_SPEC.buttons.w, PHONE_SPEC.buttons.volumeH, 2);
  ctx.fill();

  ctx.restore();
}

/* Render the angled view by building an SVG with a <foreignObject>
   containing the phone HTML + the CSS 3D transform, then rasterizing
   it. This uses the browser's native rendering pipeline, so the
   result is identical to the on-screen preview. */
async function renderAngledViaSvg(img) {
  const SCALE = 3;
  const PAD = 80; // extra padding so the rotated phone + shadow fit
  const W = PHONE_SPEC.width  + PAD * 2;
  const H = PHONE_SPEC.height + PAD * 2;

  // Convert the loaded image to a data URL so we can inline it in the SVG
  const imgDataUrl = imageToDataUrl(img);

  // Compute the cover-fit draw dimensions (same math as renderFlatPhone)
  const bezel = PHONE_SPEC.bezel;
  const sw = PHONE_SPEC.width - bezel * 2;
  const sh = PHONE_SPEC.height - bezel * 2;
  const screenAspect = sw / sh;
  const imgAspect = img.width / img.height;
  let cssW, cssH, cssX, cssY;
  if (imgAspect > screenAspect) {
    cssH = sh;
    cssW = sh * imgAspect;
    cssX = bezel - (cssW - sw) / 2;
    cssY = bezel;
  } else {
    cssW = sw;
    cssH = sw / imgAspect;
    cssX = bezel;
    cssY = bezel - (cssH - sh) / 2;
  }

  const [frameC1, frameC2] = FRAME_GRADIENTS[state.frame];

  // Back face colors (darker shade of frame color) for 3D depth
  const BACK_FACE = {
    obsidian:  ['#0a0a0c', '#050507'],
    porcelain: ['#c8c8c0', '#a8a8a0'],
    rose:      ['#a85a70', '#884560'],
    hazel:     ['#786a4f', '#5a4d38'],
  };
  const [backC1, backC2] = BACK_FACE[state.frame];
  const PHONE_DEPTH = 18; // phone thickness in px

  // Build the phone HTML exactly as it appears in the preview,
  // with inline styles so the SVG renderer doesn't need external CSS.
  // Uses a single back face (translateZ) for clean 3D depth —
  // both faces share the same border-radius, so no corner artifacts.
  const phoneHtml = `
    <div xmlns="http://www.w3.org/1999/xhtml" style="
      width: ${PHONE_SPEC.width}px;
      height: ${PHONE_SPEC.height}px;
      position: relative;
      transform: perspective(900px) rotateY(-32deg) rotateX(5deg);
      transform-style: preserve-3d;
    ">
      <!-- Back face (pushed behind for 3D depth) -->
      <div style="
        position: absolute; inset: 0;
        border-radius: ${PHONE_SPEC.outerRadius}px;
        transform: translateZ(-${PHONE_DEPTH}px);
        background: linear-gradient(145deg, ${backC1}, ${backC2});
      "></div>
      <!-- Front face (phone body + screen) -->
      <div style="
        position: absolute; inset: 0;
        border-radius: ${PHONE_SPEC.outerRadius}px;
        padding: ${bezel}px;
        background: linear-gradient(145deg, ${frameC1}, ${frameC2});
        box-shadow:
          inset 0 0 0 1px rgba(255,255,255,0.08),
          0 0 0 1px rgba(0,0,0,0.6),
          0 30px 60px rgba(0,0,0,0.55),
          0 12px 24px rgba(0,0,0,0.4);
        transform-style: preserve-3d;
      ">
        <div style="
          position: relative; width: 100%; height: 100%;
          border-radius: ${PHONE_SPEC.screenRadius}px;
          overflow: hidden; background: #000;
          box-shadow: inset 0 0 0 1px rgba(0,0,0,0.8);
        ">
          <img src="${imgDataUrl}" style="
            position: absolute;
            width: ${cssW}px; height: ${cssH}px;
            left: ${cssX - bezel}px; top: ${cssY - bezel}px;
            object-fit: fill; display: block;
          " />
          <div style="
            position: absolute; top: 7px; left: 50%;
            transform: translateX(-50%);
            width: 10px; height: 10px;
            background: #000; border-radius: 50%;
            box-shadow: inset 0 0 0 1px rgba(255,255,255,0.15);
          "></div>
        </div>
      </div>
      <!-- Side buttons (on the right edge) -->
      <div style="
        position: absolute; top: 28%; right: -5px;
        width: 6px; height: 70px;
        background: linear-gradient(90deg, #1a1a1d, #3a3a3e);
        border-radius: 0 2px 2px 0;
      "></div>
      <div style="
        position: absolute; top: 42%; right: -5px;
        width: 6px; height: 50px;
        background: linear-gradient(90deg, #1a1a1d, #3a3a3e);
        border-radius: 0 2px 2px 0;
      "></div>
    </div>
  `;

  // Wrap in an SVG with a foreignObject. The SVG is rendered at SCALE
  // for crisp output.
  const svg = `
    <svg xmlns="http://www.w3.org/2000/svg"
         width="${W * SCALE}" height="${H * SCALE}"
         viewBox="0 0 ${W} ${H}">
      <foreignObject x="0" y="0" width="${W}" height="${H}">
        ${phoneHtml}
      </foreignObject>
    </svg>
  `;

  // Position the phone in the center of the SVG canvas with padding
  // Adjust the inner div to be offset by PAD
  const svgWithOffset = svg.replace(
    'width: ' + PHONE_SPEC.width + 'px;',
    'width: ' + PHONE_SPEC.width + 'px; margin-left: ' + PAD + 'px; margin-top: ' + PAD + 'px;'
  );

  const svgBlob = new Blob([svgWithOffset], { type: 'image/svg+xml;charset=utf-8' });
  // Use a data URL instead of a blob URL to avoid canvas tainting.
  // Blob URLs taint the canvas in some browsers; data URLs don't.
  const svgDataUrl = 'data:image/svg+xml;charset=utf-8,' + encodeURIComponent(svgWithOffset);

  try {
    const renderedImg = await loadImage(svgDataUrl);
    const canvas = document.createElement('canvas');
    canvas.width  = W * SCALE;
    canvas.height = H * SCALE;
    const ctx = canvas.getContext('2d');
    ctx.drawImage(renderedImg, 0, 0);
    return canvas;
  } finally {
    // Nothing to revoke for data URLs
  }
}

/* Convert an Image object to a data URL (for inlining in SVG) */
function imageToDataUrl(img) {
  const canvas = document.createElement('canvas');
  canvas.width = img.width;
  canvas.height = img.height;
  canvas.getContext('2d').drawImage(img, 0, 0);
  try {
    return canvas.toDataURL('image/png');
  } catch (e) {
    // If tainted (CORS), fall back to the src URL directly
    return img.src;
  }
}

/* Trigger the PNG download from a canvas */
function triggerDownload(canvas, baseName) {
  try {
    const link = document.createElement('a');
    link.download = baseName.replace(/\.[^.]+$/, '') + '-pixel10.png';
    link.href = canvas.toDataURL('image/png');
    link.click();
    showSnackbar('Downloaded');
  } catch (err) {
    console.error(err);
    showSnackbar('Export failed', 'error');
  }
}

/* Helper: draw a rounded-rectangle path */
function drawRoundRect(ctx, x, y, w, h, r) {
  r = Math.min(r, w / 2, h / 2);
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.arcTo(x + w, y,     x + w, y + h, r);
  ctx.arcTo(x + w, y + h, x,     y + h, r);
  ctx.arcTo(x,     y + h, x,     y,     r);
  ctx.arcTo(x,     y,     x + w, y,     r);
  ctx.closePath();
}

/* Helper: load an image and resolve when done */
function loadImage(src) {
  return new Promise((resolve, reject) => {
    const img = new Image();
    img.crossOrigin = 'anonymous';
    img.onload = () => resolve(img);
    img.onerror = reject;
    img.src = src;
  });
}

/* Capture a representative frame from a video as a data URL */
function captureVideoFrame(videoUrl) {
  return new Promise((resolve, reject) => {
    const video = document.createElement('video');
    video.src = videoUrl;
    video.muted = true;
    video.playsInline = true;
    video.crossOrigin = 'anonymous';
    video.addEventListener('loadeddata', () => {
      video.currentTime = Math.min(video.duration * 0.25, 1);
    }, { once: true });
    video.addEventListener('seeked', () => {
      try {
        const c = document.createElement('canvas');
        c.width = video.videoWidth || 1080;
        c.height = video.videoHeight || 1920;
        c.getContext('2d').drawImage(video, 0, 0, c.width, c.height);
        resolve(c.toDataURL('image/png'));
      } catch (e) { reject(e); }
    }, { once: true });
    video.addEventListener('error', reject, { once: true });
  });
}

downloadAllBtn.addEventListener('click', async () => {
  if (!state.files.length) return;
  downloadAllBtn.disabled = true;
  downloadAllBtn.innerHTML = '<svg viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="12" r="5"/></svg> Exporting…';
  for (const item of state.files) {
    await downloadMockup(item);
    await new Promise(r => setTimeout(r, 400));
  }
  downloadAllBtn.disabled = false;
  downloadAllBtn.innerHTML = '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/></svg> Download All';
});

clearAllBtn.addEventListener('click', () => {
  if (!state.files.length) return;
  if (!confirm('Remove all mockups?')) return;
  state.files.forEach(f => { if (f.url.startsWith('blob:')) URL.revokeObjectURL(f.url); });
  state.files = [];
  renderGallery();
  controlsBar.classList.remove('visible');
  showSnackbar('Cleared all mockups');
});

/* ============================================================
   Control changes
   ============================================================ */
frameSelect.addEventListener('change', (e) => { state.frame = e.target.value; renderGallery(); });
viewSelect.addEventListener('change', (e) => { state.view = e.target.value; renderGallery(); });

/* ============================================================
   Snackbar
   ============================================================ */
function showSnackbar(message, type = '') {
  const snack = document.createElement('div');
  snack.className = 'snackbar';
  if (type === 'error') {
    snack.style.background = 'var(--md-sys-color-error-container)';
    snack.style.color = 'var(--md-sys-color-on-error-container)';
  }
  snack.textContent = message;
  snackbarContainer.appendChild(snack);
  setTimeout(() => snack.remove(), 3200);
}

/* ============================================================
   Init — gallery starts empty, user uploads populate it
   ============================================================ */
</script>
